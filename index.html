  .unlock-btn { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid #334155; background: #1e2030; color: #94a3b8; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
  .unlock-btn:hover { color: #6366f1; border-color: #6366f1; }
</style>
</head>
<body>

<!-- Password Modal -->
<div id="password-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="pwd-title">SECURE ACCESS</div>
    <div class="modal-sub" id="pwd-sub">Please verify your identity.</div>
    <input type="password" id="pwd-input" class="input-field" placeholder="Password" onkeydown="if(event.key==='Enter') verifyPassword()">
    <button class="primary-btn" onclick="verifyPassword()">UNLOCK</button>
    <button class="close-modal" onclick="closeModals()">CANCEL</button>
  </div>
</div>

<!-- Upload / Settings Modal -->
<div id="upload-overlay" class="modal-overlay active">
  <div class="modal">
    <div class="modal-title">SETTINGS</div>
    <div class="modal-sub">Update data or export the tool for offline use.</div>
    
    <label style="font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px;">Upload New Report</label>
    <input type="file" id="excel-upload" class="input-field" accept=".xlsx, .xls" style="padding: 8px;">
    <button class="primary-btn" id="process-btn" onclick="processUpload()">PROCESS &amp; FILTER</button>
    
    <div style="height: 1px; background: #1e2030; margin: 20px 0;"></div>
    
    <label style="font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px;">Export Dashboard</label>
    <button class="secondary-btn" onclick="downloadDashboard()">DOWNLOAD STANDALONE HTML</button>
    
    <button class="close-modal" onclick="closeModals()">CLOSE</button>
  </div>
</div>

<div class="header">
  <div>
    <div class="header-title">EXCEPTIONS REPORT</div>
    <div class="header-sub">Commission Loss Analysis · Jeffrey Bilbrey Region</div>
  </div>
  <div class="btn-group">
    <button class="tab-btn active" id="btn-rep" onclick="switchView('rep')">By Rep</button>
    <button class="tab-btn" id="btn-store" onclick="switchView('store')">By Store</button>
    <button class="tab-btn" id="btn-exception" onclick="switchView('exception')">By Exception</button>
    <button class="tab-btn" id="btn-cancel" onclick="switchView('cancel')">Cancellations</button>
    <button class="settings-btn" onclick="requestAccess('settings')" title="Settings &amp; Upload">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" style="color:#f97316;" id="total-count">0</div>
        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#6366f1;" id="rep-count">0</div>
        <div class="stat-label" id="count-label">Reps Affected</div>
      </div>
    </div>
    <div class="mini-chart">
      <div class="mini-chart-title">Breakdown</div>
      <div id="top-issues-chart"></div>
    </div>
    <div class="list-label" id="list-label">Items</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="Search..." oninput="onSearch()">
    </div>
    <div id="list-container"></div>
  </div>

  <div class="main" id="main-content"><div class="empty-state"><div class="empty-title">SELECT A CATEGORY</div><div class="empty-sub">Choose from the list to view data</div></div></div>
</div>

<script>
// ── Core Config ──────────────────────────────────────────────────────────────
const RSD_NAME_FILTER = "Jeffrey Bilbrey";
const ISSUE_INFO = {
  "Cancel Rekey": { color:"#ef4444", bg:"#fef2f2", border:"#fecaca", description:"Customer already had service at this address. Cancelling and restarting service is not commissionable." },
  "Fails 3-Day Rule": { color:"#f97316", bg:"#fff7ed", border:"#fed7aa", description:"Active service existed at address within 3 days. Restarting under different family names is ineligible." },
  "Insufficient Revenue Lift": { color:"#eab308", bg:"#fefce8", border:"#fef08a", description:"Bill must increase by more than $1.00 for the sale to be commissionable." },
  "More than 60 days to install": { color:"#8b5cf6", bg:"#faf5ff", border:"#ddd6fe", description:"Install not completed within 60 days of order." },
  "No Camera Sold With Order": { color:"#06b6d4", bg:"#ecfeff", border:"#a5f3fc", description:"Smart home security systems must include a camera for payment." },
  "XFM - Same Day Disconnect": { color:"#ec4899", bg:"#fdf2f8", border:"#fbcfe8", description:"Mobile line cancelled on the same day it was established." },
  "Risk Assurance": { color:"#64748b", bg:"#f8fafc", border:"#cbd5e1", description:"Failed internal risk assessment. Suggest using XOE to ensure prepayments are collected." },
  "Customer had service within 120 Days": { color:"#10b981", bg:"#ecfdf5", border:"#a7f3d0", description:"Customer had recent service history within 120 days." },
  "Customer had FLEX service within 120 Days": { color:"#10b981", bg:"#ecfdf5", border:"#a7f3d0", description:"FLEX service history within 120 days makes order ineligible." },
  "Customer disconnected more than twice": { color:"#f43f5e", bg:"#fff1f2", border:"#fecdd3", description:"Pattern of repeated disconnections is not commissionable." },
};
const CANCEL_REASON_INFO = {
  "CUST REFUSED": { color:"#ef4444", bg:"#fef2f2", border:"#fecaca", desc:"Customer refused installation at the door." },
  "OLD PENDG CNCL": { color:"#64748b", bg:"#f8fafc", border:"#cbd5e1", desc:"Old pending order cancelled by system." },
  "CANCEL @CHECKIN": { color:"#f97316", bg:"#fff7ed", border:"#fed7aa", desc:"Cancelled during technician check-in." },
  "OFFICE CORRECTN": { color:"#8b5cf6", bg:"#faf5ff", border:"#ddd6fe", desc:"Cancelled due to data entry correction." },
  "CUSTOMER CHOICE": { color:"#06b6d4", bg:"#ecfeff", border:"#a5f3fc", desc:"Customer voluntarily cancelled." },
  "COMPETITION": { color:"#eab308", bg:"#fefce8", border:"#fef08a", desc:"Customer chose a different provider." },
  "Unknown": { color:"#94a3b8", bg:"#f1f5f9", border:"#e2e8f0", desc:"No reason recorded." },
};

// ── State ────────────────────────────────────────────────────────────────────
let RAW_DATA = JSON.parse(localStorage.getItem('ex_raw_jb') || '[]');
let CANCEL_DATA = JSON.parse(localStorage.getItem('ex_can_jb') || '[]');
let currentView = "rep";
let selectedKey = null;
let expandedIssue = null;
let searchQuery = "";
let isUnlocked = false;
let pendingTask = null;

// ── Data Processing ──────────────────────────────────────────────────────────
function getIssueKey(row) { return row.type === "Risk Assurance" ? "Risk Assurance" : (row.subType || row.type); }

function processStats() {
  const stats = { reps: [], stores: [], issues: [], cancels: [] };
  const repMap = {}, storeMap = {}, issueMap = {}, cancelMap = {};

  RAW_DATA.forEach(row => {
    if (row.rep) {
      if (!repMap[row.rep]) repMap[row.rep] = { key: row.rep, label: row.rep, issues: {}, allRows: [] };
      repMap[row.rep].allRows.push(row);
      const k = getIssueKey(row);
      if (!repMap[row.rep].issues[k]) repMap[row.rep].issues[k] = { count: 0, customerIds: new Set(), lobMap: {} };
      repMap[row.rep].issues[k].count++;
      repMap[row.rep].issues[k].customerIds.add(row.customerId);
      if (row.lob) {
        if (!repMap[row.rep].issues[k].lobMap[row.customerId]) repMap[row.rep].issues[k].lobMap[row.customerId] = new Set();
        repMap[row.rep].issues[k].lobMap[row.customerId].add(row.lob);
      }
    }
    if (!storeMap[row.store]) storeMap[row.store] = { key: row.store, label: row.store, reps: new Set(), issues: {}, allRows: [] };
    storeMap[row.store].allRows.push(row);
    if (row.rep) storeMap[row.store].reps.add(row.rep);
    const ik = getIssueKey(row);
    if (!storeMap[row.store].issues[ik]) storeMap[row.store].issues[ik] = { count: 0 };
    storeMap[row.store].issues[ik].count++;

    const gk = getIssueKey(row);
    if (!issueMap[gk]) issueMap[gk] = { key: gk, label: gk, reps: new Set(), issues: {}, allRows: [] };
    issueMap[gk].allRows.push(row);
    if (row.rep) {
        issueMap[gk].reps.add(row.rep);
        if (!issueMap[gk].issues[row.rep]) issueMap[gk].issues[row.rep] = { count:0, customerIds: new Set(), lobMap: {}, store: row.store };
        issueMap[gk].issues[row.rep].count++;
        issueMap[gk].issues[row.rep].customerIds.add(row.customerId);
    }
  });

  CANCEL_DATA.forEach(row => {
    if (!cancelMap[row.store]) cancelMap[row.store] = { key: row.store, label: row.store, reasons: {}, allRows: [] };
    cancelMap[row.store].allRows.push(row);
    const r = row.reason || 'Unknown';
    if (!cancelMap[row.store].reasons[r]) cancelMap[row.store].reasons[r] = { count: 0, rows: [] };
    cancelMap[row.store].reasons[r].count++;
    cancelMap[row.store].reasons[r].rows.push(row);
  });

  stats.reps = Object.values(repMap).sort((a,b)=>b.allRows.length - a.allRows.length);
  stats.stores = Object.values(storeMap).sort((a,b)=>b.allRows.length - a.allRows.length);
  stats.issues = Object.values(issueMap).sort((a,b)=>b.allRows.length - a.allRows.length);
  stats.cancels = Object.values(cancelMap).sort((a,b)=>b.allRows.length - a.allRows.length);
  return stats;
}

let activeStats = processStats();

// ── Rendering ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const isCan = currentView === "cancel";
  const list = currentView === "rep" ? activeStats.reps : currentView === "store" ? activeStats.stores : currentView === "exception" ? activeStats.issues : activeStats.cancels;
  
  document.getElementById("total-count").textContent = isCan ? CANCEL_DATA.length : RAW_DATA.length;
  document.getElementById("rep-count").textContent = list.length;
  document.getElementById("count-label").textContent = currentView === "rep" ? "Reps Affected" : currentView === "exception" ? "Issue Types" : "Stores";

  let chartHTML = "";
  if (isCan) {
    const counts = {}; CANCEL_DATA.forEach(c => counts[c.reason]=(counts[c.reason]||0)+1);
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const max = top[0]?.[1] || 1;
    chartHTML = top.map(([k,v]) => `<div class="bar-row"><div class="bar-row-labels"><span>${k}</span><span>${v}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v/max)*100}%;background:${CANCEL_REASON_INFO[k]?.color||'#64748b'}"></div></div></div>`).join("");
  } else {
    const top = activeStats.issues.slice(0,5);
    const max = top[0]?.allRows.length || 1;
    chartHTML = top.map(i => `<div class="bar-row"><div class="bar-row-labels"><span>${i.label}</span><span>${i.allRows.length}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(i.allRows.length/max)*100}%;background:${ISSUE_INFO[i.key]?.color||'#64748b'}"></div></div></div>`).join("");
  }
  document.getElementById("top-issues-chart").innerHTML = chartHTML;

  const q = searchQuery.toLowerCase();
  const filtered = list.filter(s => s.label.toLowerCase().includes(q));
  document.getElementById("list-container").innerHTML = filtered.map(s => `
    <div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
      <div class="list-item-name">${s.label}</div>
      <div class="list-item-sub">${s.allRows.length} items</div>
    </div>
  `).join("");
}

function renderMain() {
  const main = document.getElementById("main-content");
  const list = currentView === "rep" ? activeStats.reps : currentView === "store" ? activeStats.stores : currentView === "exception" ? activeStats.issues : activeStats.cancels;
  const sel = list.find(s => s.key === selectedKey);

  if (!sel) {
    main.innerHTML = `<div class="empty-state"><div class="empty-title">SELECT A CATEGORY</div><div class="empty-sub">Choose from the list to view data</div></div>`;
    return;
  }

  const unlockHeader = `<button class="unlock-btn" onclick="requestAccess('unlock')">${isUnlocked ? '🔒 Locked' : '🔓 Unlock IDs'}</button>`;
  const mask = (id) => isUnlocked ? id : `••••${String(id).slice(-4)}`;

  let content = `<div class="detail-header"><div class="detail-title">${sel.label}</div><div class="detail-sub">${sel.allRows.length} entries</div></div>`;

  if (currentView === "cancel") {
    const reasons = Object.entries(sel.reasons).sort((a,b)=>b[1].count-a[1].count);
    content += reasons.map(([r, d]) => `
      <div class="issue-card" style="border-color:${CANCEL_REASON_INFO[r]?.border};background:${CANCEL_REASON_INFO[r]?.bg}" onclick="toggleIssue('${r.replace(/'/g,"\\'")}')">
        <div class="issue-card-header"><div class="issue-name" style="color:${CANCEL_REASON_INFO[r]?.color}">${r} (${d.count})</div><div class="issue-toggle">${expandedIssue===r?'▲':'▼'}</div></div>
        ${expandedIssue===r ? `<div class="issue-body"><table class="acct-table"><thead><tr><th>Rep</th><th>Account Number ${unlockHeader}</th><th>Date</th></tr></thead><tbody>${d.rows.map(row=>`<tr><td>${row.rep||'—'}</td><td>${mask(row.customerId)}</td><td>${row.cancelDate}</td></tr>`).join("")}</tbody></table></div>`:''}
      </div>`).join("");
  } else {
    const issues = Object.entries(sel.issues);
    content += issues.map(([k, d]) => `
      <div class="issue-card" style="border-color:${ISSUE_INFO[k]?.border || '#1e2030'};background:${ISSUE_INFO[k]?.bg || '#16161f'}" onclick="toggleIssue('${k.replace(/'/g,"\\'")}')">
        <div class="issue-card-header"><div class="issue-name" style="color:${ISSUE_INFO[k]?.color || '#cbd5e1'}">${k} (${d.count})</div><div class="issue-toggle">${expandedIssue===k?'▲':'▼'}</div></div>
        ${expandedIssue===k ? `<div class="issue-body"><table class="acct-table"><thead><tr><th>Identity</th><th>Account Number ${unlockHeader}</th><th>LOB</th></tr></thead>
          <tbody>${[...d.customerIds].map(cid => {
            const row = sel.allRows.find(r => r.customerId === cid);
            const lobs = [...(d.lobMap?.[cid] || [])].map(l => `<span class="lob-pill">${l}</span>`).join("");
            return `<tr><td>${row.rep || row.store}</td><td>${mask(cid)}</td><td>${lobs}</td></tr>`;
          }).join("")}</tbody></table></div>`:''}
      </div>`).join("");
  }
  main.innerHTML = content;
}

// ── App Handlers ─────────────────────────────────────────────────────────────
function requestAccess(task) {
  pendingTask = task;
  const overlay = document.getElementById('password-overlay');
  document.getElementById('pwd-input').value = '';
  overlay.classList.add('active');
  document.getElementById('pwd-input').focus();
}

function verifyPassword() {
  const pwd = document.getElementById('pwd-input').value;
  if (pendingTask === 'settings' && pwd === 'Password123!') {
    closeModals();
    document.getElementById('upload-overlay').classList.add('active');
  } else if (pendingTask === 'unlock' && pwd === 'Xf!nity250') {
    isUnlocked = !isUnlocked;
    closeModals();
    renderMain();
  } else {
    alert('Incorrect Password');
  }
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function processUpload() {
  const fileInput = document.getElementById('excel-upload');
  const btn = document.getElementById('process-btn');
  const file = fileInput.files[0];
  if (!file) { alert("Please select a file."); return; }

  btn.disabled = true;
  btn.textContent = "PROCESSING...";

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      let newRaw = [], newCancel = [];
      let totalChecked = 0;

      workbook.SheetNames.forEach(name => {
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
        if (!json.length) return;
        totalChecked += json.length;

        // DETECTION LOGIC: Matches "RD" column first, then "RSD"
        const headerKeys = Object.keys(json[0]);
        const rsdKey = headerKeys.find(k => k.toLowerCase() === 'rd') || headerKeys.find(k => /rsd|director|rvp/i.test(k));

        const filtered = json.filter(r => {
          if (!rsdKey) return false;
          const val = String(r[rsdKey] || "").toLowerCase();
          return val.includes(RSD_NAME_FILTER.toLowerCase());
        });

        const sheetKeys = headerKeys.map(k => k.toLowerCase());
        if (sheetKeys.includes('reason') || sheetKeys.includes('cancel reason')) {
          newCancel = [...newCancel, ...filtered.map(r => ({
            store: r.Store || r.store || r['Store Name'] || "",
            rep: r['Rep Name'] || r.Rep || r.rep || r.Salesperson || "",
            customerId: String(r['Customer ID'] || r.customerId || r.Account || ""),
            cancelDate: r['Date Of Cancelation'] || r['Cancel Date'] || r.cancelDate || "",
            reason: r['Cancel Reason'] || r.Reason || r.reason || "Unknown"
          }))];
        } else {
          newRaw = [...newRaw, ...filtered.map(r => ({
            store: r.Store || r.store || r['Store Name'] || "",
            rep: r['Rep Name'] || r.Rep || r.rep || r.Salesperson || "",
            customerId: String(r['Customer ID'] || r.customerId || r.Account || ""),
            type: r.Type || r.type || "",
            subType: r['Sub Type'] || r.SubType || r.subType || "",
            lob: r.LOB || r.lob || ""
          }))];
        }
      });

      if (newRaw.length === 0 && newCancel.length === 0) {
        alert(`Finished! Checked ${totalChecked} rows across all sheets, but found 0 matches for RD/RSD: "${RSD_NAME_FILTER}".`);
      } else {
        RAW_DATA = newRaw;
        CANCEL_DATA = newCancel;
        localStorage.setItem('ex_raw_jb', JSON.stringify(RAW_DATA));
        localStorage.setItem('ex_can_jb', JSON.stringify(CANCEL_DATA));
        activeStats = processStats();
        selectedKey = null;
        alert(`Successfully updated! Found ${newRaw.length} exceptions and ${newCancel.length} cancellations for your region.`);
        closeModals();
        switchView('rep');
      }
    } catch (err) {
      console.error(err);
      alert("Error parsing file. Ensure it is a valid Excel (.xlsx) document.");
    } finally {
      btn.disabled = false;
      btn.textContent = "PROCESS & FILTER";
    }
  };
  reader.readAsArrayBuffer(file);
}

function downloadDashboard() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "Exceptions_Report_Tool.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function switchView(v) {
  currentView = v; selectedKey = null; expandedIssue = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const target = document.getElementById(`btn-${v}`);
  if(target) target.classList.add('active');
  renderSidebar(); renderMain();
}

function selectItem(key) { selectedKey = key; expandedIssue = null; renderMain(); renderSidebar(); }
function toggleIssue(key) { expandedIssue = (expandedIssue === key ? null : key); renderMain(); }
function onSearch() { searchQuery = document.getElementById("search-input").value; renderSidebar(); }

renderSidebar();
renderMain();
</script>

</body></html>
