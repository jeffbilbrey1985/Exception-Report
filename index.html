<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exceptions Report — Jeffrey Bilbrey Region</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#1a1a22;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
  .header{background:#0f0f13;border-bottom:1px solid #1e2030;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
  .header-sub{font-size:11px;color:#475569;margin-top:2px;letter-spacing:2px;text-transform:uppercase;}
  .tab-btn{cursor:pointer;padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;transition:all 0.2s;border:1px solid #1e2030;background:#16161f;color:#64748b;}
  .tab-btn.active{background:#6366f1;color:white;border-color:#6366f1;}
  .tab-btn:hover:not(.active){color:#94a3b8;border-color:#334155;}
  .layout{display:flex;height:calc(100vh - 73px);}
  .sidebar{width:280px;border-right:1px solid #1e2030;padding:16px 14px;overflow-y:auto;flex-shrink:0;}
  .main{flex:1;overflow-y:auto;padding:24px 28px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .stat-card{background:#16161f;border:1px solid #1e2030;border-radius:10px;padding:16px 20px;}
  .stat-num{font-size:22px;font-weight:500;}
  .stat-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .mini-chart{background:#16161f;border:1px solid #1e2030;border-radius:12px;padding:12px 14px;margin-bottom:14px;}
  .mini-chart-title{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
  .bar-row{margin-bottom:8px;}
  .bar-row-labels{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
  .bar-track{height:6px;border-radius:3px;background:#1e2030;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-input{width:100%;background:#16161f;border:1px solid #1e2030;border-radius:8px;padding:8px 12px 8px 32px;font-family:inherit;font-size:12px;color:#cbd5e1;outline:none;transition:border-color 0.2s;}
  .search-input::placeholder{color:#334155;}
  .search-input:focus{border-color:#6366f1;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#475569;font-size:13px;pointer-events:none;}
  .list-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
  .list-item{cursor:pointer;padding:10px 14px;border-radius:8px;border:1px solid #1e2030;transition:all 0.15s;margin-bottom:6px;background:#16161f;}
  .list-item:hover{border-color:#334155;background:#1a1a24;}
  .list-item.active{border-color:#6366f1;background:#1e1e30;}
  .list-item-name{font-size:12px;font-weight:500;color:#cbd5e1;}
  .list-item.active .list-item-name{color:#a5b4fc;}
  .list-item-sub{font-size:10px;color:#475569;margin-top:2px;}
  .detail-header{margin-bottom:24px;}
  .detail-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;}
  .detail-sub{font-size:12px;color:#475569;margin-top:4px;}
  .badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
  .issue-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;}
  .issue-card{border-radius:10px;border:1px solid;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:filter 0.15s;}
  .issue-card:hover{filter:brightness(1.05);}
  .issue-card-header{display:flex;align-items:center;justify-content:space-between;}
  .issue-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;}
  .issue-name{font-size:13px;font-weight:500;}
  .issue-meta{font-size:11px;color:#64748b;margin-top:1px;}
  .issue-toggle{color:#94a3b8;font-size:16px;}
  .issue-body{margin-top:14px;padding-top:14px;}
  .issue-desc{border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.6;color:#475569;margin-bottom:14px;background:rgba(0,0,0,0.08);}
  .section-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
  .tag{display:inline-block;background:#1e2030;border:1px solid #2d3148;color:#94a3b8;border-radius:6px;padding:2px 8px;font-size:10px;margin:2px;letter-spacing:0.5px;}
  .rep-tag{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;margin:2px;}
  .lob-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;margin:2px;letter-spacing:0.5px;background:#1e2030;color:#94a3b8;border:1px solid #2d3148;}
  .acct-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;}
  .acct-table th{text-align:left;color:#64748b;font-weight:400;padding:4px 8px;border-bottom:1px solid #1e2030;text-transform:uppercase;letter-spacing:1px;font-size:10px;}
  .acct-table td{padding:5px 8px;border-bottom:1px solid rgba(30,32,48,0.5);color:#cbd5e1;vertical-align:top;}
  .acct-table tr:last-child td{border-bottom:none;}
  .acct-table tr:hover td{background:rgba(255,255,255,0.02);}
  .lob-hsi{background:#1e3a5f;color:#60a5fa;border-color:#1d4ed8;}
  .lob-video{background:#3b1f5e;color:#c084fc;border-color:#7c3aed;}
  .lob-xfm{background:#3b1a1a;color:#f87171;border-color:#dc2626;}
  .lob-xhs{background:#1a3320;color:#4ade80;border-color:#16a34a;}
  .lob-cdv{background:#1a2e3b;color:#38bdf8;border-color:#0284c7;}
  .lob-other{background:#1e2030;color:#94a3b8;border-color:#334155;}
  .empty-title{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:#1e2030;margin-bottom:12px;}
  .empty-sub{font-size:13px;letter-spacing:1px;}
</style>
</head>

<div class="header">
  <div>
    <div class="header-title">EXCEPTIONS REPORT</div>
    <div class="header-sub">Commission Loss Analysis · Jeffrey Bilbrey Region</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="tab-btn active" id="btn-rep" onclick="switchView('rep')">By Rep</button>
    <button class="tab-btn" id="btn-store" onclick="switchView('store')">By Store</button>
    <button class="tab-btn" id="btn-exception" onclick="switchView('exception')">By Exception</button>
    <button class="tab-btn" id="btn-cancel" onclick="switchView('cancel')">Cancellations</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" style="color:#f97316;" id="total-count">0</div>
        <div class="stat-label">Total Exceptions</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#6366f1;" id="rep-count">0</div>
        <div class="stat-label" id="count-label">Reps Affected</div>
      </div>
    </div>
    <div class="mini-chart">
      <div class="mini-chart-title">Top Issues</div>
      <div id="top-issues-chart"></div>
    </div>
    <div class="list-label" id="list-label">Reps</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="Search by name..." oninput="onSearch()"/>
    </div>
    <div id="list-container"></div>
  </div>

  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="empty-title" id="empty-title">SELECT A REP</div>
      <div class="empty-sub">Choose from the list to view detailed exceptions</div>
    </div>
  </div>
</div>

function acctTableHTML(acctMap, color, border) {
  const entries = Object.entries(acctMap);
  if (!entries.length) return '';
  // Sort by date ascending
  entries.sort((a, b) => {
    const parse = d => { const [m,day,y] = d.split(/[\/|]/)[0].split('/'); return new Date('20'+y, m-1, day); };
    return parse(a[0]) - parse(b[0]);
  });
  return `
    <table class="acct-table">
      <thead><tr><th>#</th><th>Order Date</th><th>Lines of Business</th></tr></thead>
      <tbody>${entries.map(([key, lobs], i) => {
        const date = key.includes('|') ? key.split('|')[1] : key;
        const lobHTML = [...lobs].sort().map(l => {
          const cls = l==="HSI"?"lob-hsi":l==="Video"?"lob-video":l==="XFM"?"lob-xfm":l==="XHS"?"lob-xhs":l==="CDV"?"lob-cdv":"lob-other";
          return '<span class="lob-pill '+cls+'">'+l+'</span>';
        }).join("");
        return '<tr><td style="color:'+color+';font-weight:500;width:36px">Acct '+(i+1)+'</td><td style="color:#94a3b8;white-space:nowrap;width:72px">'+date+'</td><td>'+lobHTML+'</td></tr>';
      }).join("")}</tbody>
    </table>`;
}

function acctDateRange(acctMap) {
  const dates = Object.keys(acctMap).map(k => k.includes('|') ? k.split('|')[1] : k);
  if (!dates.length) return '';
  const parsed = dates.map(d => { const [m,day,y] = d.split('/'); return {d, t: new Date('20'+y,m-1,day)}; });
  parsed.sort((a,b) => a.t - b.t);
  if (parsed.length === 1) return parsed[0].d;
  return parsed[0].d + ' – ' + parsed[parsed.length-1].d;
}
function getIssueKey(row) {
  return row.type === "Risk Assurance" ? "Risk Assurance" : (row.subType || row.type);

function buildRepStats() {
  const map = {};
  RAW_DATA.filter(d => d.rep && d.rep.trim()).forEach(row => {
    const rep = row.rep;
    if (!map[rep]) map[rep] = { key: rep, label: rep, sub: row.store, issues: {}, allRows: [] };
    map[rep].allRows.push(row);
    const k = getIssueKey(row);
    if (!map[rep].issues[k]) map[rep].issues[k] = { count:0, acctMap: {} };
    // Group LOBs by order date — same date = same account (anonymised)
    if (row.lob) {
      if (!map[rep].issues[k].acctMap[row.date]) map[rep].issues[k].acctMap[row.date] = new Set();
      map[rep].issues[k].acctMap[row.date].add(row.lob);
    }
    map[rep].issues[k].count++;
  });
  return Object.values(map).sort((a,b) => b.allRows.length - a.allRows.length);
}

function buildStoreStats() {
  const map = {};
  RAW_DATA.forEach(row => {
    const s = row.store;
    if (!map[s]) map[s] = { key: s, label: s, reps: new Set(), issues: {}, allRows: [] };
    map[s].allRows.push(row);
    if (row.rep) map[s].reps.add(row.rep);
    const k = getIssueKey(row);
    if (!map[s].issues[k]) map[s].issues[k] = { count:0, acctMap: {} };
    if (row.lob) {
      const key2 = (row.rep||'') + '|' + row.date;
      if (!map[s].issues[k].acctMap[key2]) map[s].issues[k].acctMap[key2] = new Set();
      map[s].issues[k].acctMap[key2].add(row.lob);
    }
    map[s].issues[k].count++;
  });
  return Object.values(map).sort((a,b) => b.allRows.length - a.allRows.length);
}

const repStats   = buildRepStats();
const storeStats = buildStoreStats();

function buildExceptionStats() {
  const map = {};
  RAW_DATA.filter(d => d.rep && d.rep.trim()).forEach(row => {
    const k = getIssueKey(row);
    if (!map[k]) map[k] = { key: k, label: k, reps: new Set(), stores: new Set(), issues: {}, allRows: [] };
    map[k].allRows.push(row);
    if (row.rep) map[k].reps.add(row.rep);
    if (row.store) map[k].stores.add(row.store);
    // sub-breakdown by rep
    const rep = row.rep;
    if (!map[k].issues[rep]) map[k].issues[rep] = { count:0, acctMap: {}, store: row.store };
    map[k].issues[rep].count++;
    if (row.lob) {
      if (!map[k].issues[rep].acctMap[row.date]) map[k].issues[rep].acctMap[row.date] = new Set();
      map[k].issues[rep].acctMap[row.date].add(row.lob);
    }
  });
  return Object.values(map).sort((a,b) => b.allRows.length - a.allRows.length);
}

  return cancelStats;
}
function getSelected() { return getStats().find(s => s.key === selectedKey); }

// ── Top issues global ─────────────────────────────────────────────────────────
function getTopIssues() {
  const counts = {};
  RAW_DATA.filter(d => d.rep && d.rep.trim()).forEach(r => {
    const k = getIssueKey(r);
    counts[k] = (counts[k]||0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1]);
}
const topIssues = getTopIssues();
const filteredCount = RAW_DATA.filter(d => d.rep && d.rep.trim()).length;

// ── Render ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById("total-count").textContent = currentView === "cancel" ? CANCEL_DATA.length : filteredCount;
  if (currentView === "rep") {
    document.getElementById("rep-count").textContent = repStats.length;
    document.getElementById("count-label").textContent = "Reps Affected";
  } else if (currentView === "store") {
    document.getElementById("rep-count").textContent = storeStats.length;
    document.getElementById("count-label").textContent = "Stores";
  } else if (currentView === "exception") {
    document.getElementById("rep-count").textContent = exceptionStats.length;
    document.getElementById("count-label").textContent = "Issue Types";
  } else {
    document.getElementById("rep-count").textContent = cancelStats.length;
    document.getElementById("count-label").textContent = "Stores";
  }

  // Mini chart — show cancel reasons for cancel view
  if (currentView === "cancel") {
    const reasonCounts = {};
    CANCEL_DATA.forEach(r => { reasonCounts[r.reason] = (reasonCounts[r.reason]||0) + 1; });
    const top5 = Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const max = top5[0][1];
    document.getElementById("top-issues-chart").innerHTML = top5.map(([reason, cnt]) => `
      <div class="bar-row">
        <div class="bar-row-labels">
          <span style="color:${cancelColor(reason)};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${reason}</span>
          <span style="color:#64748b">${cnt}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max)*100}%;background:${cancelColor(reason)}"></div></div>
      </div>`).join("");
  } else {
    const max = topIssues[0][1];
    document.getElementById("top-issues-chart").innerHTML = topIssues.slice(0,5).map(([key,cnt]) => `
      <div class="bar-row">
        <div class="bar-row-labels">
          <span style="color:${issueColor(key)};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${key}</span>
          <span style="color:#64748b">${cnt}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max)*100}%;background:${issueColor(key)}"></div></div>
      </div>`).join("");
  }

  // List
  const q = searchQuery.toLowerCase();
  const stats = getStats();
  const filtered = stats.filter(s => !q || s.label.toLowerCase().includes(q));
  const countLabel = q ? `${filtered.length} of ${stats.length}` : stats.length;

  if (currentView === "rep") document.getElementById("list-label").textContent = `Reps (${countLabel})`;
  else if (currentView === "store") document.getElementById("list-label").textContent = `Stores (${countLabel})`;
  else if (currentView === "exception") document.getElementById("list-label").textContent = `Issue Types (${countLabel})`;
  else document.getElementById("list-label").textContent = `Stores (${countLabel})`;

  document.getElementById("search-input").parentElement.style.display = currentView === "exception" ? "none" : "block";

  document.getElementById("list-container").innerHTML = filtered.length
    ? filtered.map(s => {
        if (currentView === "exception") {
          return `<div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
            <div class="list-item-name" style="color:${issueColor(s.key)}">${s.label}</div>
            <div class="list-item-sub"><span style="color:#f97316">${s.allRows.length} exceptions</span> · ${s.reps.size} reps · ${s.stores.size} stores</div>
          </div>`;
        }
        if (currentView === "cancel") {
          const topReason = Object.entries(s.reasons).sort((a,b)=>b[1].count-a[1].count)[0];
          return `<div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
            <div class="list-item-name">${s.label}</div>
            <div class="list-item-sub"><span style="color:#f97316">${s.allRows.length} cancellations</span>${topReason ? ` · Top: <span style="color:${cancelColor(topReason[0])}">${topReason[0]}</span>` : ''}</div>
          </div>`;
        }
        return `<div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
          <div class="list-item-name">${s.label}</div>
          <div class="list-item-sub">${currentView === "rep"
            ? `${s.sub} · <span style="color:#f97316">${s.allRows.length} exceptions</span>`
            : `<span style="color:#f97316">${s.allRows.length} exceptions</span> · ${s.reps.size} reps`
          }</div>
        </div>`;
      }).join("")
    : `<div style="color:#475569;font-size:12px;padding:12px;text-align:center;">No results for "${searchQuery}"</div>`;
}

function renderMain() {
  const sel = getSelected();
  const main = document.getElementById("main-content");
  if (!sel) {
    const emptyLabel = currentView === "rep" ? "SELECT A REP" : currentView === "store" ? "SELECT A STORE" : currentView === "exception" ? "SELECT AN EXCEPTION" : "SELECT A STORE";
    main.innerHTML = `<div class="empty-state">
      <div class="empty-title">${emptyLabel}</div>
      <div class="empty-sub">Choose from the list to view detailed ${currentView === "cancel" ? "cancellations" : "exceptions"}</div>
    </div>`;
    return;
  }

  // ── Cancel view ──────────────────────────────────────────────────────────────
  if (currentView === "cancel") {
    const reasonEntries = Object.entries(sel.reasons).sort((a,b) => b[1].count - a[1].count);
    const badgeHTML = reasonEntries.map(([r, d]) => `
      <div class="issue-badge" style="color:${cancelColor(r)};background:${cancelBg(r)};border-color:${cancelBorder(r)}">
        ${r} <strong>×${d.count}</strong>
      </div>`).join("");

    const cardsHTML = reasonEntries.map(([reason, d]) => {
      const isOpen = expandedIssue === reason;
      // Group by rep within this reason
      const repMap = {};
      d.rows.forEach(row => {
        const k = row.rep || 'Unknown Rep';
        if (!repMap[k]) repMap[k] = [];
        repMap[k].push(row);
      });
      const repEntries = Object.entries(repMap).sort((a,b) => b[1].length - a[1].length);

      const bodyHTML = isOpen ? `
        <div class="issue-body" style="border-top:1px solid ${cancelBorder(reason)}">
          <div class="issue-desc"><strong style="color:${cancelColor(reason)}">What this means:</strong> ${cancelDesc(reason)}</div>
          <div class="section-label" style="margin-bottom:8px">Orders (${d.rows.length})</div>
          <table class="acct-table">
            <thead><tr><th>Rep</th><th>Order Date</th><th>Cancel Date</th></tr></thead>
            <tbody>${d.rows.map(row => `
              <tr>
                <td style="color:#94a3b8">${row.rep || '<span style="color:#475569;font-style:italic">Unknown</span>'}</td>
                <td style="color:#64748b;font-size:10px">${row.orderDate}</td>
                <td style="color:#64748b;font-size:10px">${row.cancelDate}</td>
              </tr>`).join("")}
            </tbody>
          </table>
          ${repEntries.length > 1 ? `<div style="margin-top:14px">
            <div class="section-label" style="margin-bottom:6px">By Rep</div>
            <div>${repEntries.map(([rep, rows]) => `
              <span class="rep-tag" style="background:rgba(0,0,0,0.08);border:1px solid ${cancelBorder(reason)};color:${cancelColor(reason)}">
                ${rep} <strong>×${rows.length}</strong>
              </span>`).join("")}
            </div>
          </div>` : ''}
        </div>` : "";

      return `
        <div class="issue-card" style="background:${cancelBg(reason)};border-color:${cancelBorder(reason)}" onclick="toggleIssue('${reason.replace(/'/g,"\\'")}')">
          <div class="issue-card-header">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="issue-icon" style="background:${cancelColor(reason)}">${d.count}</div>
              <div>
                <div class="issue-name" style="color:${cancelColor(reason)}">${reason}</div>
                <div class="issue-meta">${d.rows.length} order${d.rows.length!==1?"s":""} · ${new Set(d.rows.map(r=>r.rep).filter(Boolean)).size} reps</div>
              </div>
            </div>
            <div class="issue-toggle">${isOpen ? "▲" : "▼"}</div>
          </div>
          ${bodyHTML}
        </div>`;
    }).join("");

    main.innerHTML = `
      <div class="detail-header">
        <div class="detail-title">${sel.label}</div>
        <div class="detail-sub">${sel.allRows.length} cancelled orders · ${reasonEntries.length} reason codes · ${sel.reps.size} reps</div>
      </div>
      <div class="badge-row">${badgeHTML}</div>
      ${cardsHTML}`;
    return;
  }

  // ── Exception view: breakdown by rep ────────────────────────────────────────
  if (currentView === "exception") {
    const issueKey = sel.key;
    const info = ISSUE_INFO[issueKey] || {};
    const repEntries = Object.entries(sel.issues).sort((a,b) => b[1].count - a[1].count);

    const repCardsHTML = repEntries.map(([rep, d]) => {
      const repIssueKey = rep + '||' + issueKey;
      const isOpen = expandedIssue === repIssueKey;
      return `
        <div class="issue-card" style="background:${issueBg(issueKey)};border-color:${issueBorder(issueKey)}" onclick="toggleIssue('${repIssueKey.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
          <div class="issue-card-header">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="issue-icon" style="background:${issueColor(issueKey)}">${d.count}</div>
              <div>
                <div class="issue-name" style="color:${issueColor(issueKey)}">${rep}</div>
                <div class="issue-meta">${d.store} · ${Object.keys(d.acctMap).length} account${Object.keys(d.acctMap).length!==1?"s":""} · ${d.count} line${d.count!==1?"s":""} · ${acctDateRange(d.acctMap)}</div>
              </div>
            </div>
            <div class="issue-toggle">${isOpen ? "▲" : "▼"}</div>
          </div>
          ${isOpen ? `
          <div class="issue-body" style="border-top:1px solid ${issueBorder(issueKey)}">
            <div class="section-label" style="margin-bottom:6px">Accounts & Lines of Business (${Object.keys(d.acctMap).length})</div>
            ${acctTableHTML(d.acctMap, issueColor(issueKey), issueBorder(issueKey))}
          </div>` : ""}
        </div>`;
    }).join("");

    main.innerHTML = `
      <div class="detail-header">
        <div class="detail-title" style="color:${issueColor(issueKey)}">${sel.label}</div>
        <div class="detail-sub">${sel.allRows.length} total exception lines · ${sel.reps.size} reps affected · ${sel.stores.size} stores</div>
      </div>
      <div class="issue-desc" style="background:${issueBg(issueKey)};border:1px solid ${issueBorder(issueKey)};border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;line-height:1.7;color:#475569">
        <strong style="color:${issueColor(issueKey)}">What this means:</strong> ${info.description || "See report for details."}
      </div>
      <div class="list-label" style="margin-bottom:10px">Reps Affected (${repEntries.length})</div>
      ${repCardsHTML}`;
    return;
  }

  // ── Rep / Store views (existing logic) ───────────────────────────────────────
  const issueEntries = Object.entries(sel.issues).sort((a,b) => b[1].count - a[1].count);

  const badgeHTML = issueEntries.map(([k, d]) => `
    <div class="issue-badge" style="color:${issueColor(k)};background:${issueBg(k)};border-color:${issueBorder(k)}">
      ${k} <strong>×${d.count}</strong>
    </div>`).join("");

  const subLine = currentView === "rep"
    ? `Store: ${sel.sub} · ${sel.allRows.length} total exception lines · ${issueEntries.length} issue types`
    : `${sel.allRows.length} total exception lines · ${sel.reps.size} reps · ${issueEntries.length} issue types`;

  const cardsHTML = issueEntries.map(([k, d]) => {
    const info   = ISSUE_INFO[k] || {};
    const isOpen = expandedIssue === k;
    let repBreakdown = "";
    if (currentView === "store") {
      const rb = {};
      sel.allRows.filter(r => getIssueKey(r) === k && r.rep).forEach(r => { rb[r.rep] = (rb[r.rep]||0)+1; });
      const rbEntries = Object.entries(rb).sort((a,b) => b[1]-a[1]);
      if (rbEntries.length) {
        repBreakdown = `<div style="margin-top:12px">
          <div class="section-label">By Rep</div>
          <div>${rbEntries.map(([rep,cnt]) => `
            <span class="rep-tag" style="background:rgba(0,0,0,0.08);border:1px solid ${issueBorder(k)};color:${issueColor(k)}">
              ${rep} <strong>×${cnt}</strong>
            </span>`).join("")}
          </div>
        </div>`;
      }
    }

    const bodyHTML = isOpen ? `
      <div class="issue-body" style="border-top:1px solid ${issueBorder(k)}">
        <div class="issue-desc"><strong style="color:${issueColor(k)}">What this means:</strong> ${info.description||"See report for details."}</div>
        <div style="margin-bottom:10px">
          <div class="section-label" style="margin-bottom:6px">Accounts & Lines of Business (${Object.keys(d.acctMap).length})</div>
          ${acctTableHTML(d.acctMap, issueColor(k), issueBorder(k))}
        </div>
        ${repBreakdown}
      </div>` : "";

    return `
      <div class="issue-card" style="background:${issueBg(k)};border-color:${issueBorder(k)}" onclick="toggleIssue('${k.replace(/'/g,"\\'")}')">
        <div class="issue-card-header">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="issue-icon" style="background:${issueColor(k)}">${d.count}</div>
            <div>
              <div class="issue-name" style="color:${issueColor(k)}">${k}</div>
              <div class="issue-meta">${Object.keys(d.acctMap).length} account${Object.keys(d.acctMap).length!==1?"s":""} · ${d.count} line${d.count!==1?"s":""} · ${acctDateRange(d.acctMap)}</div>
            </div>
          </div>
          <div class="issue-toggle">${isOpen ? "▲" : "▼"}</div>
        </div>
        ${bodyHTML}
      </div>`;
  }).join("");

  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${sel.label}</div>
      <div class="detail-sub">${subLine}</div>
    </div>
    <div class="badge-row">${badgeHTML}</div>
    ${cardsHTML}`;
}

function render() {
  renderSidebar();
  renderMain();
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onSearch() {
  searchQuery = document.getElementById("search-input").value;
  renderSidebar();
}

function switchView(v) {
  currentView  = v;
  selectedKey  = null;
  expandedIssue = null;
  searchQuery  = "";
  document.getElementById("btn-rep").classList.toggle("active",       v === "rep");
  document.getElementById("btn-store").classList.toggle("active",     v === "store");
  document.getElementById("btn-exception").classList.toggle("active", v === "exception");
  document.getElementById("btn-cancel").classList.toggle("active",    v === "cancel");
  document.getElementById("search-input").value = "";
  render();
}

function selectItem(key) {
  selectedKey   = key;
  expandedIssue = null;
  render();
}

function toggleIssue(key) {
  expandedIssue = expandedIssue === key ? null : key;
  renderMain();
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
