function getIssueKey(row) {
  return row.type === "Risk Assurance" ? "Risk Assurance" : (row.subType || row.type);
}
function issueColor(k) { return (ISSUE_INFO[k]||{color:"#64748b"}).color; }
function issueBg(k) { return (ISSUE_INFO[k]||{bg:"#f8fafc"}).bg; }
function issueBorder(k) { return (ISSUE_INFO[k]||{border:"#cbd5e1"}).border; }

let currentView = "rep";
let selectedKey  = null;
let expandedIssue = null;
let searchQuery  = "";

// ── Build stats ───────────────────────────────────────────────────────────────
function buildRepStats() {
  const map = {};
  RAW_DATA.filter(d => d.rep && d.rep.trim()).forEach(row => {
    const rep = row.rep;
    if (!map[rep]) map[rep] = { key: rep, label: rep, sub: row.store, issues: {}, allRows: [] };
    map[rep].allRows.push(row);
    const k = getIssueKey(row);
    if (!map[rep].issues[k]) map[rep].issues[k] = { count:0, customerIds: new Set(), workOrders: new Set(), lobMap: {} };
    map[rep].issues[k].count++;
    map[rep].issues[k].customerIds.add(row.customerId);
    map[rep].issues[k].workOrders.add(row.workOrder);
    if (row.lob) {
      const cid = row.customerId;
      if (!map[rep].issues[k].lobMap[cid]) map[rep].issues[k].lobMap[cid] = new Set();
      map[rep].issues[k].lobMap[cid].add(row.lob);
    }
  });
  return Object.values(map).sort((a,b) => b.allRows.length - a.allRows.length);
}

function buildStoreStats() {
  const map = {};
  RAW_DATA.forEach(row => {
    const s = row.store;
    if (!map[s]) map[s] = { key: s, label: s, reps: new Set(), issues: {}, allRows: [] };
    map[s].allRows.push(row);
    if (row.rep) map[s].reps.add(row.rep);
    const k = getIssueKey(row);
    if (!map[s].issues[k]) map[s].issues[k] = { count:0, customerIds: new Set(), workOrders: new Set(), lobMap: {} };
    map[s].issues[k].count++;
    map[s].issues[k].customerIds.add(row.customerId);
    map[s].issues[k].workOrders.add(row.workOrder);
    if (row.lob) {
      const cid = row.customerId;
      if (!map[s].issues[k].lobMap[cid]) map[s].issues[k].lobMap[cid] = new Set();
      map[s].issues[k].lobMap[cid].add(row.lob);
    }
  });
  return Object.values(map).sort((a,b) => b.allRows.length - a.allRows.length);
}

const repStats   = buildRepStats();
const storeStats = buildStoreStats();

function getStats() { return currentView === "rep" ? repStats : storeStats; }
function getSelected() { return getStats().find(s => s.key === selectedKey); }

// ── Top issues global ─────────────────────────────────────────────────────────
function getTopIssues() {
  const counts = {};
  RAW_DATA.filter(d => d.rep && d.rep.trim()).forEach(r => {
    const k = getIssueKey(r);
    counts[k] = (counts[k]||0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1]);
}
const topIssues = getTopIssues();
const filteredCount = RAW_DATA.filter(d => d.rep && d.rep.trim()).length;

// ── Render ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById("total-count").textContent = filteredCount;
  document.getElementById("rep-count").textContent   = currentView === "rep" ? repStats.length : storeStats.length;
  document.getElementById("count-label").textContent = currentView === "rep" ? "Reps Affected" : "Stores";
  document.getElementById("list-label").textContent  = currentView === "rep"
    ? `Reps (${repStats.length})` : `Stores (${storeStats.length})`;

  // Mini chart
  const max = topIssues[0][1];
  document.getElementById("top-issues-chart").innerHTML = topIssues.slice(0,5).map(([key,cnt]) => `
    <div class="bar-row">
      <div class="bar-row-labels">
        <span style="color:${issueColor(key)};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${key}</span>
        <span style="color:#64748b">${cnt}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max)*100}%;background:${issueColor(key)}"></div></div>
    </div>`).join("");

  // List
  const q = searchQuery.toLowerCase();
  const filtered = getStats().filter(s => !q || s.label.toLowerCase().includes(q));
  const countLabel = q ? `${filtered.length} of ${getStats().length}` : getStats().length;
  document.getElementById("list-label").textContent = currentView === "rep"
    ? `Reps (${countLabel})` : `Stores (${countLabel})`;
  document.getElementById("list-container").innerHTML = filtered.length
    ? filtered.map(s => `
    <div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
      <div class="list-item-name">${s.label}</div>
      <div class="list-item-sub">${currentView === "rep"
        ? `${s.sub} · <span style="color:#f97316">${s.allRows.length} exceptions</span>`
        : `<span style="color:#f97316">${s.allRows.length} exceptions</span> · ${s.reps.size} reps`
      }</div>
    </div>`).join("")
    : `<div style="color:#475569;font-size:12px;padding:12px;text-align:center;">No results for "${searchQuery}"</div>`;
}

function renderMain() {
  const sel = getSelected();
  const main = document.getElementById("main-content");
  if (!sel) {
    main.innerHTML = `<div class="empty-state">
      <div class="empty-title">${currentView === "rep" ? "SELECT A REP" : "SELECT A STORE"}</div>
      <div class="empty-sub">Choose from the list to view detailed exceptions</div>
    </div>`;
    return;
  }

  const issueEntries = Object.entries(sel.issues).sort((a,b) => b[1].count - a[1].count);

  const badgeHTML = issueEntries.map(([k, d]) => `
    <div class="issue-badge" style="color:${issueColor(k)};background:${issueBg(k)};border-color:${issueBorder(k)}">
      ${k} <strong>×${d.count}</strong>
    </div>`).join("");

  const subLine = currentView === "rep"
    ? `Store: ${sel.sub} · ${sel.allRows.length} total exception lines · ${issueEntries.length} issue types`
    : `${sel.allRows.length} total exception lines · ${sel.reps.size} reps · ${issueEntries.length} issue types`;

  const cardsHTML = issueEntries.map(([k, d]) => {
    const info   = ISSUE_INFO[k] || {};
    const isOpen = expandedIssue === k;
    const cids   = [...d.customerIds];
    const wos    = [...d.workOrders];

    let repBreakdown = "";
    if (currentView === "store") {
      const rb = {};
      sel.allRows.filter(r => getIssueKey(r) === k && r.rep).forEach(r => { rb[r.rep] = (rb[r.rep]||0)+1; });
      const rbEntries = Object.entries(rb).sort((a,b) => b[1]-a[1]);
      if (rbEntries.length) {
        repBreakdown = `<div style="margin-top:12px">
          <div class="section-label">By Rep</div>
          <div>${rbEntries.map(([rep,cnt]) => `
            <span class="rep-tag" style="background:rgba(0,0,0,0.08);border:1px solid ${issueBorder(k)};color:${issueColor(k)}">
              ${rep} <strong>×${cnt}</strong>
            </span>`).join("")}
          </div>
        </div>`;
      }
    }

    const bodyHTML = isOpen ? `
      <div class="issue-body" style="border-top:1px solid ${issueBorder(k)}">
        <div class="issue-desc"><strong style="color:${issueColor(k)}">What this means:</strong> ${info.description||"See report for details."}</div>
        <div style="margin-bottom:10px">
          <div class="section-label">Customer Account Numbers &amp; Line of Business (${cids.length})</div>
          <table class="acct-table">
            <thead><tr><th>Account Number</th><th>Work Order</th><th>Line of Business</th></tr></thead>
            <tbody>${cids.map(cid => {
              const wo = [...(d.workOrders)].find(w => {
                return sel.allRows.some(r => r.customerId === cid && r.workOrder === w && getIssueKey(r) === k);
              }) || "—";
              const lobs = d.lobMap[cid] ? [...d.lobMap[cid]].sort() : [];
              const lobHTML = lobs.map(l => {
                const cls = l === "HSI" ? "lob-hsi" : l === "Video" ? "lob-video" : l === "XFM" ? "lob-xfm" : l === "XHS" ? "lob-xhs" : l === "CDV" ? "lob-cdv" : "lob-other";
                return `<span class="lob-pill ${cls}">${l}</span>`;
              }).join("");
              return `<tr><td>${cid}</td><td style="color:#64748b;font-size:10px">${wo}</td><td>${lobHTML}</td></tr>`;
            }).join("")}
            </tbody>
          </table>
        </div>
        ${repBreakdown}
      </div>` : "";

    return `
      <div class="issue-card" style="background:${issueBg(k)};border-color:${issueBorder(k)}" onclick="toggleIssue('${k.replace(/'/g,"\\'")}')">
        <div class="issue-card-header">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="issue-icon" style="background:${issueColor(k)}">${d.count}</div>
            <div>
              <div class="issue-name" style="color:${issueColor(k)}">${k}</div>
              <div class="issue-meta">${cids.length} account${cids.length!==1?"s":""} · ${wos.length} work order${wos.length!==1?"s":""}</div>
            </div>
          </div>
          <div class="issue-toggle">${isOpen ? "▲" : "▼"}</div>
        </div>
        ${bodyHTML}
      </div>`;
  }).join("");

  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${sel.label}</div>
      <div class="detail-sub">${subLine}</div>
    </div>
    <div class="badge-row">${badgeHTML}</div>
    ${cardsHTML}`;
}

function render() {
  renderSidebar();
  renderMain();
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onSearch() {
  searchQuery = document.getElementById("search-input").value;
  renderSidebar();
}

function switchView(v) {
  currentView  = v;
  selectedKey  = null;
  expandedIssue = null;
  searchQuery  = "";
  document.getElementById("btn-rep").classList.toggle("active",   v === "rep");
  document.getElementById("btn-store").classList.toggle("active", v === "store");
  document.getElementById("search-input").value = "";
  render();
}

function selectItem(key) {
  selectedKey   = key;
  expandedIssue = null;
  render();
}

function toggleIssue(key) {
  expandedIssue = expandedIssue === key ? null : key;
  renderMain();
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
