<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exceptions Report — Jeffrey Bilbrey Region</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<!-- SheetJS for Excel Parsing -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script>
  // --- Global State ---
  window.RAW_DATA = [];
  window.CANCEL_DATA = [];
  window.activeStats = { reps: [], stores: [], issues: [], cancels: [] };
  window.RSD_NAME_FILTER = "Jeffrey Bilbrey";
</script>

<!-- Firebase Module -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  let db, auth, appId;
  
  // Try to init Firebase only if config exists
  if (typeof __firebase_config !== 'undefined') {
    try {
      const config = JSON.parse(__firebase_config);
      const app = initializeApp(config);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

      const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
      if (token) { await signInWithCustomToken(auth, token); } 
      else { await signInAnonymously(auth); }

      onAuthStateChanged(auth, (u) => {
        if (u) {
          const reportDoc = doc(db, 'artifacts', appId, 'public', 'data', 'reports', 'bilbrey_region');
          onSnapshot(reportDoc, (snapshot) => {
            if (snapshot.exists()) {
              const data = snapshot.data();
              window.RAW_DATA = data.raw || [];
              window.CANCEL_DATA = data.cancel || [];
              updateAndRender();
            }
          });
        }
      });

      window.pushDataToCloud = async (raw, cancel) => {
        const reportDoc = doc(db, 'artifacts', appId, 'public', 'data', 'reports', 'bilbrey_region');
        await setDoc(reportDoc, {
          raw: raw,
          cancel: cancel,
          lastUpdated: new Date().toISOString()
        });
      };
    } catch (e) { console.warn("Firebase Init Skipped (Local Mode)"); }
  }

  function updateAndRender() {
    if (typeof window.processStats === 'function') { window.activeStats = window.processStats(); }
    if (typeof window.render === 'function') { window.render(); }
  }
</script>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono','Courier New',monospace;background:#0f0f13;min-height:100vh;color:#e2e8f0;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#1a1a22;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
  
  .header{background:#0f0f13;border-bottom:1px solid #1e2030;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
  .header-sub{font-size:11px;color:#475569;margin-top:2px;letter-spacing:2px;text-transform:uppercase;}
  
  .btn-group{display:flex;gap:8px;align-items:center;}
  .tab-btn{cursor:pointer;padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;transition:all 0.2s;border:1px solid #1e2030;background:#16161f;color:#64748b;}
  .tab-btn.active{background:#6366f1;color:white;border-color:#6366f1;}
  
  .settings-btn { background: transparent; border: 1px solid #1e2030; color: #475569; padding: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .settings-btn:hover { border-color: #6366f1; color: #6366f1; }

  .layout{display:flex;height:calc(100vh - 73px);}
  .sidebar{width:280px;border-right:1px solid #1e2030;padding:16px 14px;overflow-y:auto;flex-shrink:0;}
  .main{flex:1;overflow-y:auto;padding:24px 28px;}
  
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .stat-card{background:#16161f;border:1px solid #1e2030;border-radius:10px;padding:16px 20px;}
  .stat-num{font-size:22px;font-weight:500;}
  .stat-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  
  .search-input{width:100%;background:#16161f;border:1px solid #1e2030;border-radius:8px;padding:8px 12px;font-family:inherit;font-size:12px;color:#cbd5e1;outline:none;margin-bottom:12px;}
  .list-item{cursor:pointer;padding:10px 14px;border-radius:8px;border:1px solid #1e2030;transition:all 0.15s;margin-bottom:6px;background:#16161f;}
  .list-item.active{border-color:#6366f1;background:#1e1e30;}
  .list-item-name{font-size:12px;font-weight:500;}
  .list-item-sub{font-size:10px;color:#475569;margin-top:2px;}
  
  .detail-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:20px;}
  .issue-card{border-radius:10px;border:1px solid #1e2030;padding:14px 16px;margin-bottom:10px;cursor:pointer;background:#16161f;}
  .issue-card-header{display:flex;align-items:center;justify-content:space-between;}
  
  .acct-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:12px;}
  .acct-table th{text-align:left;color:#64748b;padding:4px 8px;border-bottom:1px solid #1e2030;}
  .acct-table td{padding:8px;border-bottom:1px solid rgba(30,32,48,0.5);color:#cbd5e1;}
  .lob-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;margin:2px;background:#1e2030;color:#94a3b8;border:1px solid #2d3148;}

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: #16161f; border: 1px solid #1e2030; border-radius: 16px; width: 100%; max-width: 400px; padding: 32px; }
  .input-field { width: 100%; background: #0f0f13; border: 1px solid #1e2030; border-radius: 8px; padding: 12px; color: white; margin-bottom: 16px; outline: none; }
  .primary-btn { width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .unlock-btn { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid #334155; background: #1e2030; color: #94a3b8; cursor: pointer; }
</style>
</head>
<body>

<div id="password-overlay" class="modal-overlay">
  <div class="modal">
    <h2 style="margin-bottom:8px">SECURE ACCESS</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:24px">Identity verification required.</p>
    <input type="password" id="pwd-input" class="input-field" placeholder="Password">
    <button class="primary-btn" onclick="verifyPassword()">UNLOCK</button>
    <button style="width:100%;background:transparent;border:none;color:#475569;cursor:pointer" onclick="closeModals()">CANCEL</button>
  </div>
</div>

<div id="upload-overlay" class="modal-overlay">
  <div class="modal">
    <h2 style="margin-bottom:8px">UPDATE REPORT</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:24px">Upload Excel to refresh regional data.</p>
    <input type="file" id="excel-upload" class="input-field" accept=".xlsx, .xls">
    <button class="primary-btn" id="process-btn" onclick="processUpload()">PROCESS & SYNC</button>
    <button style="width:100%;background:transparent;border:none;color:#475569;cursor:pointer" onclick="closeModals()">CLOSE</button>
  </div>
</div>

<div class="header">
  <div>
    <div class="header-title">EXCEPTIONS REPORT</div>
    <div class="header-sub">Jeffrey Bilbrey Region</div>
  </div>
  <div class="btn-group">
    <button class="tab-btn active" id="btn-rep" onclick="switchView('rep')">Rep</button>
    <button class="tab-btn" id="btn-store" onclick="switchView('store')">Store</button>
    <button class="tab-btn" id="btn-exception" onclick="switchView('exception')">Issue</button>
    <button class="tab-btn" id="btn-cancel" onclick="switchView('cancel')">Cancels</button>
    <button class="settings-btn" onclick="requestAccess('settings')">
       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
    </button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" style="color:#f97316;" id="total-count">0</div>
        <div class="stat-label">Exceptions</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#6366f1;" id="rep-count">0</div>
        <div class="stat-label">Groups</div>
      </div>
    </div>
    <input class="search-input" id="search-input" type="text" placeholder="Search..." oninput="onSearch()"/>
    <div id="list-container"></div>
  </div>
  <div class="main" id="main-content">
    <div class="empty-state" style="text-align: center; padding-top: 100px;">
      <div class="empty-title" style="font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #1e2030; margin-bottom: 16px;">NO DATA LOADED</div>
      <p style="color: #475569; font-size: 14px; max-width: 400px; margin: 0 auto;">Click the <strong>Sync Icon</strong> in the top right to upload your Excel file and initialize the dashboard.</p>
    </div>
  </div>
</div>

<script>
let currentView = "rep";
let selectedKey = null;
let expandedIssue = null;
let searchQuery = "";
let isUnlocked = false;
let pendingTask = null;

window.getIssueKey = function(row) { return row.type === "Risk Assurance" ? "Risk Assurance" : (row.subType || row.type); }

window.processStats = function() {
  const stats = { reps: [], stores: [], issues: [], cancels: [] };
  const rM = {}, sM = {}, iM = {}, cM = {};

  window.RAW_DATA.forEach(row => {
    if (row.rep) {
      if (!rM[row.rep]) rM[row.rep] = { key: row.rep, label: row.rep, issues: {}, allRows: [] };
      rM[row.rep].allRows.push(row);
      const k = window.getIssueKey(row);
      if (!rM[row.rep].issues[k]) rM[row.rep].issues[k] = { count: 0, customerIds: new Set(), lobMap: {} };
      rM[row.rep].issues[k].count++;
      rM[row.rep].issues[k].customerIds.add(row.customerId);
      if (row.lob) {
        if (!rM[row.rep].issues[k].lobMap[row.customerId]) rM[row.rep].issues[k].lobMap[row.customerId] = new Set();
        rM[row.rep].issues[k].lobMap[row.customerId].add(row.lob);
      }
    }
    if (!sM[row.store]) sM[row.store] = { key: row.store, label: row.store, reps: new Set(), issues: {}, allRows: [] };
    sM[row.store].allRows.push(row);
    const ik = window.getIssueKey(row);
    if (!sM[row.store].issues[ik]) sM[row.store].issues[ik] = { count: 0 };
    sM[row.store].issues[ik].count++;

    const gk = window.getIssueKey(row);
    if (!iM[gk]) iM[gk] = { key: gk, label: gk, reps: new Set(), issues: {}, allRows: [] };
    iM[gk].allRows.push(row);
  });

  window.CANCEL_DATA.forEach(row => {
    if (!cM[row.store]) cM[row.store] = { key: row.store, label: row.store, reasons: {}, allRows: [] };
    cM[row.store].allRows.push(row);
    const r = row.reason || 'Unknown';
    if (!cM[row.store].reasons[r]) cM[row.store].reasons[r] = { count: 0, rows: [] };
    cM[row.store].reasons[r].count++;
    cM[row.store].reasons[r].rows.push(row);
  });

  stats.reps = Object.values(rM).sort((a,b)=>b.allRows.length-a.allRows.length);
  stats.stores = Object.values(sM).sort((a,b)=>b.allRows.length-a.allRows.length);
  stats.issues = Object.values(iM).sort((a,b)=>b.allRows.length-a.allRows.length);
  stats.cancels = Object.values(cM).sort((a,b)=>b.allRows.length-a.allRows.length);
  return stats;
}

window.renderSidebar = function() {
  const isCan = currentView === "cancel";
  const list = currentView === "rep" ? window.activeStats.reps : currentView === "store" ? window.activeStats.stores : currentView === "exception" ? window.activeStats.issues : window.activeStats.cancels;
  document.getElementById("total-count").textContent = isCan ? window.CANCEL_DATA.length : window.RAW_DATA.length;
  document.getElementById("rep-count").textContent = list.length;
  const filtered = list.filter(s => s.label.toLowerCase().includes(searchQuery.toLowerCase()));
  document.getElementById("list-container").innerHTML = filtered.map(s => `
    <div class="list-item ${s.key === selectedKey ? 'active' : ''}" onclick="selectItem('${s.key.replace(/'/g,"\\'")}')">
      <div class="list-item-name">${s.label}</div>
      <div class="list-item-sub">${s.allRows.length} items</div>
    </div>`).join("");
}

window.renderMain = function() {
  const main = document.getElementById("main-content");
  const list = currentView === "rep" ? window.activeStats.reps : currentView === "store" ? window.activeStats.stores : currentView === "exception" ? window.activeStats.issues : window.activeStats.cancels;
  const sel = list.find(s => s.key === selectedKey);
  if (!sel) return;
  const mask = (id) => isUnlocked ? id : `••••${String(id).slice(-4)}`;
  const uH = `<button class="unlock-btn" onclick="requestAccess('unlock')">${isUnlocked ? '🔒' : '🔓'}</button>`;
  
  let cards = "";
  if (currentView === "cancel") {
    cards = Object.entries(sel.reasons).map(([r, d]) => `
      <div class="issue-card" onclick="toggleIssue('${r.replace(/'/g,"\\'")}')">
        <div class="issue-card-header"><div class="issue-name">${r} (${d.count})</div><div>${expandedIssue===r?'▲':'▼'}</div></div>
        ${expandedIssue===r ? `<table class="acct-table"><thead><tr><th>Rep</th><th>Account ${uH}</th><th>Date</th></tr></thead><tbody>${d.rows.map(row=>`<tr><td>${row.rep||'—'}</td><td>${mask(row.customerId)}</td><td>${row.cancelDate}</td></tr>`).join("")}</tbody></table>`:''}
      </div>`).join("");
  } else {
    cards = Object.entries(sel.issues || {}).map(([k, d]) => `
      <div class="issue-card" onclick="toggleIssue('${k.replace(/'/g,"\\'")}')">
        <div class="issue-card-header"><div class="issue-name">${k} (${d.count})</div><div>${expandedIssue===k?'▲':'▼'}</div></div>
        ${expandedIssue===k ? `<table class="acct-table"><thead><tr><th>Identity</th><th>Account ${uH}</th><th>LOB</th></tr></thead>
          <tbody>${[...d.customerIds].map(cid => {
            const row = sel.allRows.find(r => r.customerId === cid);
            const lobs = [...(d.lobMap?.[cid] || [])].map(l => `<span class="lob-pill">${l}</span>`).join("");
            return `<tr><td>${row.rep || row.store}</td><td>${mask(cid)}</td><td>${lobs}</td></tr>`;
          }).join("")}</tbody></table>`:''}
      </div>`).join("");
  }
  main.innerHTML = `<div class="detail-header"><div class="detail-title">${sel.label}</div></div>${cards}`;
}

window.render = function() { window.renderSidebar(); window.renderMain(); }
window.requestAccess = function(t) { pendingTask = t; document.getElementById('password-overlay').classList.add('active'); document.getElementById('pwd-input').value = ''; }
window.verifyPassword = function() {
  const p = document.getElementById('pwd-input').value;
  if (pendingTask === 'settings' && p === 'Password123!') { closeModals(); document.getElementById('upload-overlay').classList.add('active'); }
  else if (pendingTask === 'unlock' && p === 'Xf!nity250') { isUnlocked = !isUnlocked; closeModals(); window.renderMain(); }
  else { alert('Access Denied'); }
}
window.closeModals = function() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

window.processUpload = async function() {
  const f = document.getElementById('excel-upload').files[0]; if (!f) return;
  const b = document.getElementById('process-btn'); b.disabled = true; b.textContent = "PROCESSING...";
  const r = new FileReader();
  r.onload = async function(e) {
    try {
      const d = new Uint8Array(e.target.result);
      const wb = XLSX.read(d, {type: 'array'});
      let raw = [], can = [];
      wb.SheetNames.forEach(n => {
        const json = XLSX.utils.sheet_to_json(wb.Sheets[n]);
        if (!json.length) return;
        const rk = Object.keys(json[0]).find(k => k.toLowerCase()==='rd' || /rsd|director/i.test(k));
        const filtered = json.filter(r => String(r[rk]||"").toLowerCase().includes(window.RSD_NAME_FILTER.toLowerCase()));
        if (Object.keys(json[0]).map(k=>k.toLowerCase()).includes('reason')) {
          can = [...can, ...filtered.map(r => ({ store: r.Store||"", rep: r['Rep Name']||r.Rep||"", customerId: String(r['Customer ID']||r.Account||""), cancelDate: r['Cancel Date']||"", reason: r.Reason||"Unknown" }))];
        } else {
          raw = [...raw, ...filtered.map(r => ({ store: r.Store||"", rep: r['Rep Name']||r.Rep||"", customerId: String(r['Customer ID']||r.Account||""), type: r.Type||"", subType: r.SubType||"", lob: r.LOB||"" }))];
        }
      });
      if (window.pushDataToCloud) { await window.pushDataToCloud(raw, can); }
      window.RAW_DATA = raw; window.CANCEL_DATA = can; window.activeStats = window.processStats();
      window.render(); alert("Report Loaded Locally."); window.closeModals();
    } catch(err) { alert("Format Error"); } finally { b.disabled = false; b.textContent = "PROCESS & SYNC"; }
  };
  r.readAsArrayBuffer(f);
}

window.switchView = function(v) { currentView = v; selectedKey = null; expandedIssue = null; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${v}`)); window.render(); }
window.selectItem = function(k) { selectedKey = k; expandedIssue = null; window.render(); }
window.toggleIssue = function(k) { expandedIssue = (expandedIssue === k ? null : k); window.renderMain(); }
window.onSearch = function() { searchQuery = document.getElementById("search-input").value; window.renderSidebar(); }

// Initial Render
window.activeStats = window.processStats();
window.render();
</script>
</body>
</html>
